<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <title>Document</title>
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen shadow-2xl">
  <div class="bg-blue-800 rounded-lg p-8 shadow-lg max-w-sm w-full">
    <h2 class="text-center text-3xl text-white mb-6 font-bold">Login</h2>
    <form action="" class="flex-col">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-1" for="username">Username</label>
        <input class="w-full px-3 py-1 bg-gray-100 border-gray-900 rounded-2xl focus:ring-gray-950 focus:outline-none" type="email" name="username" placeholder="Email">
      </div>
  
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1" for="passoword">Password</label>
        <input class="w-full px-3 py-1 bg-gray-100 border-gray-900 rounded-2xl focus:ring-gray-950 focus:outline-none" type="email" name="username" type="password" name="password" placeholder="Password">
      </div>
      <div class="flex justify-center mt-3">
        <button class="bg-gray-100 rounded-lg px-2 hover:bg-gray-200 shadow-2xl" type="submit">Login</button>
      </div>
    </form>
  </div>
</body>
</html>
